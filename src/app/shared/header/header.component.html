<nz-header class="oystr-header">
  <div class="header-inner">

    <!-- LOGO -->
    <a routerLink="/" class="header-logo">
      <span class="logo-dot"></span>
      Oystr
    </a>

    <!-- SEARCH -->
    <div class="header-search">
      <nz-input-group [nzPrefix]="searchIcon" nzSize="default">
        <input
          nz-input
          [(ngModel)]="searchQuery"
          placeholder="Events suchen…"
          class="search-input" />
      </nz-input-group>
      <ng-template #searchIcon>
        <span nz-icon nzType="search" class="search-icon"></span>
      </ng-template>
    </div>

    <!-- NAV RECHTS -->
    <div class="header-actions">

      <!-- Docs Link -->
      <a routerLink="/docs" class="nav-link">
        <span nz-icon nzType="book" nzTheme="outline"></span>
        Dokumentation
      </a>

      @if (!isLoggedIn) {
        <a routerLink="/auth/login" class="nav-link">Anmelden</a>
        <button
          nz-button
          nzType="primary"
          routerLink="/auth/register"
          class="register-btn">
          Registrieren
        </button>
      } @else {
        <!-- Neues Event -->
        <button
          nz-button
          nzType="default"
          routerLink="/events/create"
          class="create-btn">
          <span nz-icon nzType="plus"></span>
          Event erstellen
        </button>

        <!-- Profil Dropdown -->
        <div nz-dropdown [nzDropdownMenu]="profileMenu" nzTrigger="click">
          <nz-avatar
            nzText="MK"
            class="profile-avatar"
            [nzSize]="34">
          </nz-avatar>
        </div>

        <nz-dropdown-menu #profileMenu="nzDropdownMenu">
          <ul nz-menu class="profile-dropdown">
            <li nz-menu-item routerLink="/profile">
              <span nz-icon nzType="user"></span>
              Mein Profil
            </li>
            <li nz-menu-item routerLink="/events/create">
              <span nz-icon nzType="calendar"></span>
              Neues Event
            </li>
            <li nz-menu-divider></li>
            <li nz-menu-item class="logout-item">
              <span nz-icon nzType="logout"></span>
              Abmelden
            </li>
          </ul>
        </nz-dropdown-menu>
      }
    </div>

  </div>
</nz-header>
