<div class="header-sticky-wrapper">
  <nz-header class="secondary-header" #headerContainer>
    <div class="status-pill" #pillElement>
      <span class="dot"></span>
      <span class="pill-text">Hinzufügen:</span>
    </div>

    <div class="header-controls">
      <div class="main-actions">
        @for (item of visibleItems; track item.id) {
          <button class="action-item ripple" (click)="addItem(item)">
            <span nz-icon [nzType]="item.icon"></span>
            <span class="label">{{ item.label }}</span>
          </button>
        }
      </div>

      @if (overflowItems.length > 0) {
        <button
          class="action-item more-button"
          [class.active]="isMenuOpen"
          (click)="toggleMenu()"
        >
          <span nz-icon [nzType]="isMenuOpen ? 'close' : 'plus'"></span>
        </button>
      }
    </div>
  </nz-header>

  @if (isMenuOpen && overflowItems.length > 0) {
    <div class="grid-card-overlay" (click)="toggleMenu()"></div>

    <div class="grid-card">
      <div class="grid-container">
        @for (item of overflowItems; track item.id) {
          <button class="grid-item" (click)="addItem(item)">
            <span nz-icon [nzType]="item.icon"></span>
            <span class="grid-label">{{ item.label }}</span>
          </button>
        }
      </div>
    </div>
  }
</div>

<div class="builder-content-area">
  <gridster [options]="options" class="gold-gridster">
    @for (element of eventService.builderElements(); track element.id) {
      <gridster-item [item]="element">

        <div class="drag-handle-outside">
          <span nz-icon nzType="holder"></span>
        </div>

        <div class="content-card">
          <div class="card-header">
            <span nz-icon [nzType]="element.icon" class="type-icon"></span>
            <span class="type-label">{{ element.label }}</span>
            <button class="delete-btn" (click)="removeElement(element.id)">
              <span nz-icon nzType="delete"></span>
            </button>
          </div>

          <div class="card-body">
            <textarea
              nz-input
              [(ngModel)]="element.data.text"
              placeholder="Schreib etwas..."
            ></textarea>
          </div>
        </div>

      </gridster-item>
    }
  </gridster>
</div>
