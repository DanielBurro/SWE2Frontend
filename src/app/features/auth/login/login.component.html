<app-header />

<div class="login-page">
  <div class="login-card">

    <div class="card-header">
      <p class="card-eyebrow">Willkommen zurück</p>
      <h1 class="card-title">Anmelden</h1>
      <p class="card-sub">Melde dich an und manage deine Events.</p>
    </div>


    <form class="auth-form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>E-Mail oder Username</label>
        <input
          type="text"
          [(ngModel)]="form.email"
          name="identifier"
          placeholder="max@example.com"
          required />
      </div>
      <div class="form-group">
        <label>Passwort</label>
        <input
          type="password"
          [(ngModel)]="form.password"
          name="password"
          placeholder="••••••••"
          required />
      </div>
      <button type="submit" class="btn-primary" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Anmeldung läuft…' : 'Anmelden' }}
      </button>

    </form>

    <p class="register-hint">
      Noch kein Konto?
      <a routerLink="/auth/register">Registrieren</a>
    </p>

  </div>
</div>
