<nz-layout class="app-layout">
  <app-header class="main-header" />

  <nz-layout class="inner-layout">
    @if (showSider) {
      <nz-sider
        class="main-sider"
        [nzCollapsed]="layoutService.siderCollapsed()"
        [nzTrigger]="null"
        nzCollapsible
        [nzWidth]="260"
        [nzCollapsedWidth]="80"
      >
        <div class="sider-content">
          <div class="sider-toggle-container">
            <button class="btn-sider-toggle" (click)="toggleCollapsed()">
              <span nz-icon [nzType]="layoutService.siderCollapsed() ? 'menu-unfold' : 'menu-fold'"></span>
            </button>
          </div>

          <ul nz-menu nzMode="inline" [nzInlineCollapsed]="layoutService.siderCollapsed()" class="main-menu">
            <li nz-menu-item routerLink="/" routerLinkActive="ant-menu-item-selected" [routerLinkActiveOptions]="{exact: true}">
              <span nz-icon nzType="home"></span>
              <span>Dashboard</span>
            </li>
            <li nz-menu-item routerLink="/events/create" routerLinkActive="ant-menu-item-selected">
              <span nz-icon nzType="plus-circle"></span>
              <span>Event erstellen</span>
            </li>
            <li nz-menu-item routerLink="/events/templates" routerLinkActive="ant-menu-item-selected">
              <span nz-icon nzType="appstore"></span>
              <span>Templates</span>
            </li>
            <li nz-menu-item routerLink="/profile" routerLinkActive="ant-menu-item-selected">
              <span nz-icon nzType="user"></span>
              <span>Profil</span>
            </li>
          </ul>
        </div>
      </nz-sider>
    }

    <nz-content class="app-content">
      <div class="content-scroll-wrapper">
        <router-outlet />
      </div>
    </nz-content>
  </nz-layout>
</nz-layout>
